- id: power-print-recognition
  year: 2024
  featured: true
  image: null
  title: { zh: '「电纹识别」智能物联用电检测装置', en: '"Power-Print Recognition" Smart IoT Electricity-Monitoring Device' }
  claim: { zh: '在受限 MCU 资源下，实现多设备非侵入式实时识别。', en: 'Real-time non-intrusive recognition of multiple devices on a resource-constrained MCU.' }
  category: { zh: '嵌入式系统 / 信号处理', en: 'Embedded Systems / Signal Processing' }
  summary:
    zh: 一款智能用电监控系统，基于瑞萨 R7FA6M5 单片机，采集电器运行电流波形，结合快速傅里叶变换（FFT）与斯皮尔曼相关性匹配算法，实现对多设备的非侵入式、实时识别与状态监测。搭配 W800 WiFi 模块，通过 TCP 协议将识别结果上传至自制 C# 上位机；系统支持本地模式匹配、实时分析、远程管理三大功能。
    en: An intelligent power-monitoring system on a Renesas R7FA6M5 MCU. It captures appliance current waveforms and combines FFT with Spearman correlation matching for non-intrusive, real-time multi-device recognition and status monitoring. A W800 Wi-Fi module uploads results over TCP to a custom C# host app, supporting local pattern matching, real-time analysis, and remote management.
  contribution:
    zh: 在赛题要求的单片机资源受限条件下完成高频信号采集与复杂算法运算：采用 DMA 传输减轻 CPU 负担，使用 12 位 ADC 以 10 kHz 采样率采集电流波形，通过 FFT 提取 512 点频域特征，并使用斯皮尔曼相关系数方法提升多设备并发识别准确率。
    en: 'Achieved high-frequency acquisition and heavy computation under tight MCU resource limits: DMA to offload the CPU, a 12-bit ADC at 10 kHz, 512-point FFT feature extraction, and Spearman correlation to boost concurrent multi-device recognition accuracy.'
  tags:
    - { zh: Renesas R7FA6M5, en: Renesas R7FA6M5 }
