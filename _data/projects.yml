    - { zh: 斯皮尔曼相关, en: Spearman }
    - { zh: DMA, en: DMA }
    - { zh: '12-bit ADC @10kHz', en: '12-bit ADC @10kHz' }
    - { zh: W800 WiFi, en: W800 WiFi }
    - { zh: TCP, en: TCP }
    - { zh: C# 上位机, en: C# Host App }
  figures:
    - { id: power-print-host, zh: 图1 C# 上位机, en: Fig.1 C# Host App }
    - { id: power-print-hardware, zh: 图2 下位机实物结构, en: Fig.2 Device Hardware }
    - { id: power-print-spectrum, zh: 图3 FFT 运算后的频谱, en: Fig.3 FFT Spectrum }
