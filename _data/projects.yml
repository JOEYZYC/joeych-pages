- id: resgatnet
  year: 2024
  featured: true
  image: null
  title: { zh: ResGatNet, en: ResGatNet }
  claim: { zh: '将含噪 IQ 信号转化为视觉表征，并以轻量网络增强低信噪比无线感知。', en: 'Noisy IQ signals become visual representations for lightweight low-SNR wireless perception.' }
  category: { zh: '无线感知 / 深度学习', en: 'Wireless Perception / Deep Learning' }
  summary:
    zh: 面向低信噪比无线感知的深度学习模型，采用三阶段架构：① 信号预处理——将含噪原始 IQ 信号映射为星座图，实现物理层信号到视觉表征的转化；② 特征提取——集成大核卷积与 ResNet-50 主干网络，通过扩大感受野与残差连接提升噪声鲁棒性；③ 特征增强与分类——创新引入门控 CNN 模块实现局部特征动态选择与噪声抑制，并采用 Kolmogorov–Arnold Network（KAN）替代传统 MLP，显著降低参数量并提升分类精度。成果发表于 IEEE Access。
    en: 'A deep-learning model for low-SNR wireless perception with a three-stage architecture: (1) signal preprocessing maps noisy raw IQ signals into constellation diagrams, turning physical-layer signals into visual representations; (2) feature extraction integrates large-kernel convolution with a ResNet-50 backbone, enlarging the receptive field and using residual connections for noise robustness; (3) feature enhancement & classification introduces a gated-CNN module for dynamic local-feature selection and noise suppression, and replaces the conventional MLP with a Kolmogorov–Arnold Network (KAN), markedly cutting parameters while improving accuracy. Published in IEEE Access.'
  contribution: { zh: 主要负责数据处理与部分代码编写。, en: Responsible for data processing and part of the codebase. }
  tags:
    - { zh: 深度学习, en: Deep Learning }
    - { zh: IQ / 星座图, en: IQ / Constellation }
    - { zh: 大核卷积, en: Large-kernel Conv }
    - { zh: ResNet-50, en: ResNet-50 }
    - { zh: 门控 CNN, en: Gated CNN }
    - { zh: KAN, en: KAN }
    - { zh: IEEE Access, en: IEEE Access }
