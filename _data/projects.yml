- id: dual-light-fusion
  year: 2024
  featured: true
  image: null
  title: { zh: '「双光融合」智能热像仪', en: '"Dual-Light Fusion" Smart Thermal Imager' }
  claim: { zh: '在边缘视觉设备上融合可见光与红外信息，实现人脸定位与实时测温。', en: 'Visible and infrared sensing converge on an edge device for face localization and real-time temperature monitoring.' }
  category: { zh: '计算机视觉 / 边缘 AI', en: 'Computer Vision / Edge AI' }
  summary:
    zh: 基于 OpenMV 独立设计的「双光融合」智能热像仪，集成可见光摄像头 OV5640 与红外传感器 MLX90640，使用 MicroPython 开发；通过二值化处理简化视觉信息，并训练部署基于 TensorFlow Lite 的轻量化人脸识别模型，实现对人脸区域的自动定位与体温实时监测。
    en: 'A "dual-light fusion" thermal imager independently designed on OpenMV, integrating an OV5640 visible-light camera and an MLX90640 infrared sensor, developed in MicroPython. Binarization simplifies the visual stream, and a lightweight TensorFlow Lite face-recognition model is trained and deployed for automatic face localization and real-time temperature monitoring.'
