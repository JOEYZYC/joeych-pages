---
layout: default
---

<article class="post-article">
  <header class="post-article__header">
    <h1 class="post-article__title">{{ page.title }}</h1>
    <time class="post-article__date" datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%Y年%m月%d日" }}
    </time>
  </header>

  <div class="post-article__body">
    {{ content }}
  </div>

  <a href="{{ '/blog.html' | relative_url }}" class="post-article__back">
    <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    <span data-en="Back to Blog">返回博客</span>
  </a>
</article>
