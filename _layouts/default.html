<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">
  <meta name="author" content="{{ site.author.name | escape }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url | escape }}">
</head>
<body>
  {% include site-header.html %}

  <main id="main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  {% include site-footer.html %}
  <script src="{{ '/assets/js/main.js' | relative_url | escape }}"></script>
</body>
</html>
