name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: >-
      (github.event.comment.author_association == 'OWNER' ||
      github.event.comment.author_association == 'MEMBER' ||
      github.event.comment.author_association == 'COLLABORATOR') &&
      (github.event.comment.body == '/oc' ||
      startsWith(github.event.comment.body, '/oc ') ||
      github.event.comment.body == '/opencode' ||
      startsWith(github.event.comment.body, '/opencode '))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Write OpenCode config
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p "$HOME/.config/opencode"
          cat > "$HOME/.config/opencode/opencode.jsonc" <<EOF
          {
            "provider": {
              "GPT": {
                "npm": "@ai-sdk/openai",
                "name": "GPT",
                "options": {
                  "baseURL": "https://ai.nullatoms.com/v1",
                  "apiKey": "${OPENAI_API_KEY}"
                },
                "models": {
                  "gpt-5.4": {
                    "name": "gpt-5.4",
                    "cost": {
                      "input": 0.425,
                      "output": 2.55,
                      "cache_read": 0.0425,
                      "reasoning": 2.55
                    }
                  },
                  "gpt-5.5": {
                    "name": "gpt-5.5",
                    "cost": {
                      "input": 0.85,
                      "output": 5.1,
                      "cache_read": 0.085,
                      "reasoning": 5.1
                    }
                  },
                  "gpt-5.4-mini": {
                    "name": "gpt-5.4-mini",
                    "cost": {
                      "input": 0.1275,
                      "output": 0.765,
                      "cache_read": 0.01275,
                      "reasoning": 0.765
                    }
                  }
                }
              }
            }
          }
          EOF

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          # OPENAI_API_KEY must be configured in GitHub Actions secrets.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: GPT/gpt-5.5
          use_github_token: true
