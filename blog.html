---
layout: default
title: 博客
---

<section class="page-header" style="margin-left: calc(-1 * var(--sp-6)); margin-right: calc(-1 * var(--sp-6)); padding-left: var(--sp-6); padding-right: var(--sp-6);">
  <span class="page-header__eyebrow">BLOG</span>
  <h1 class="page-header__title" data-en="Blog">博客</h1>
</section>

<section class="section">
  {% if site.posts.size > 0 %}
  <div class="blog-list">
    {% for post in site.posts %}
    <a href="{{ post.url | relative_url }}" class="blog-card">
      <h2 class="blog-card__title">{{ post.title }}</h2>
      <time class="blog-card__date" datetime="{{ post.date | date_to_xmlschema }}">
        {{ post.date | date: "%Y年%m月%d日" }}
      </time>
      {% if post.excerpt %}
      <p class="blog-card__excerpt">{{ post.excerpt | strip_html | truncate: 150 }}</p>
      {% endif %}
    </a>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty-state">
    <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <p class="empty-state__text" data-en="No posts yet. Stay tuned!">暂无文章，敬请期待！</p>
  </div>
  {% endif %}
</section>
